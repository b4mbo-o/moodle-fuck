<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MoodleFuck Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: linear-gradient(180deg, #ecfeff 0%, var(--bg) 100%);
        color: var(--text);
        font: 14px/1.5 "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .subtitle {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }

      .card + .card {
        margin-top: 12px;
      }

      .label {
        margin: 0 0 4px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .status {
        font-size: 15px;
        font-weight: 700;
      }

      .status-note {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .toggle {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .toggle + .toggle {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .toggle-title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }

      .toggle-note {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .switch {
        position: relative;
        width: 46px;
        height: 28px;
        flex: none;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #cbd5e1;
        border-radius: 999px;
        transition: background 0.18s ease;
        cursor: pointer;
      }

      .slider::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.18);
        transition: transform 0.18s ease;
      }

      .switch input:checked + .slider {
        background: var(--accent);
      }

      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }

      .pause-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        color: var(--text);
        padding: 9px 10px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        border-color: #94a3b8;
      }

      .resume {
        width: 100%;
        margin-top: 10px;
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      .resume:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
      }

      .pause-note {
        margin-top: 8px;
        color: var(--warn);
        font-size: 12px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MoodleFuck</h1>
      <p class="subtitle">アイコンから一時停止や精度設定を切り替えます。</p>

      <section class="card">
        <div class="label">Status</div>
        <div class="status" id="statusText">読み込み中...</div>
        <div class="status-note" id="statusNote"></div>
      </section>

      <section class="card">
        <div class="toggle">
          <div>
            <p class="toggle-title">有効にする</p>
            <p class="toggle-note">オフにすると現在のページ上でヒント生成を止めます。</p>
          </div>
          <label class="switch">
            <input id="enabledToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle">
          <div>
            <p class="toggle-title">詳細モード</p>
            <p class="toggle-note">少し重くなりますが、丁寧めに答えを作ります。</p>
          </div>
          <label class="switch">
            <input id="detailedToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle">
          <div>
            <p class="toggle-title">右下ステータス表示</p>
            <p class="toggle-note">ページ右下の進行状況パネルを表示します。</p>
          </div>
          <label class="switch">
            <input id="statusWidgetToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="label">Pause</div>
        <div class="toggle-title">一時停止</div>
        <div class="toggle-note">指定した時間だけ自動ヒント生成を止めます。</div>
        <div class="pause-grid">
          <button data-pause-minutes="5" type="button">5分</button>
          <button data-pause-minutes="15" type="button">15分</button>
          <button data-pause-minutes="30" type="button">30分</button>
          <button data-pause-minutes="60" type="button">60分</button>
        </div>
        <button class="resume" id="resumeButton" type="button">今すぐ再開</button>
        <div class="pause-note" id="pauseNote"></div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
